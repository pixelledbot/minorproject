<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/style.css">

<style>
/* image styling */
.preview {
    width: 220px;
    display: block;
    margin: 10px auto;
    border-radius: 12px;
    transition: 0.3s ease;
}

/* heatmap container */
.heatmap-box {
    text-align: center;
    margin-top: 10px;
}

/* toggle button */
.toggle-btn {
    margin: 12px auto;
    display: block;
    font-size: 13px;
    padding: 6px 14px;
    cursor: pointer;
    opacity: 0.85;
}

.toggle-btn:hover {
    opacity: 1;
}
</style>

</head>

<body class="fade">

<div class="card">

<h2>Prediction Result</h2>

<!-- ORIGINAL IMAGE -->
<img id="main-img" src="/static/uploads/{{ filename }}" class="preview">

<!-- HEATMAP -->
<div class="heatmap-box">
    <img id="heatmap-img" src="/static/uploads/{{ heatmap }}" class="preview" style="display:none;">
</div>

<!-- TOGGLE BUTTON -->
<button id="toggleBtn" class="btn secondary toggle-btn" onclick="toggleHeatmap()">
    Show Heatmap
</button>

<h3 class="result {{ prediction }}">
    {{ prediction | capitalize }}
</h3>

<!-- Confidence -->
<div class="bar">
    <div class="fill" id="main-bar"></div>
</div>
<p id="confidence-text">{{ confidence }}%</p>

<!-- Risk -->
<div class="risk {{ risk }}">
    Risk: {{ risk }}
</div>

<h4>♻️ Disposal Instructions</h4>
<p>{{ instruction }}</p>

<!-- SAFE JSON -->
<script id="prob-data" type="application/json">
{{ all_probs | tojson }}
</script>

<script id="main-conf" type="application/json">
{{ confidence }}
</script>

<h4>Confidence Breakdown</h4>
<div id="prob-container"></div>

<br>

<a href="/"><button class="btn">Try Again</button></a>
<a href="/dashboard"><button class="btn secondary">Dashboard</button></a>

</div>

<script>
// MAIN CONFIDENCE BAR
const conf = JSON.parse(
    document.getElementById("main-conf").textContent
);
document.getElementById("main-bar").style.width = conf + "%";

// PROBABILITY BARS
const probs = JSON.parse(
    document.getElementById("prob-data").textContent
);

const container = document.getElementById("prob-container");

for (let key in probs) {
    let bar = document.createElement("div");
    bar.className = "bar small";

    let fill = document.createElement("div");
    fill.className = "fill";
    fill.style.width = probs[key] + "%";

    let label = document.createElement("span");
    label.innerText = key + " (" + probs[key] + "%)";

    bar.appendChild(label);
    bar.appendChild(fill);
    container.appendChild(bar);
}

// 🔥 SMOOTH TOGGLE HEATMAP
function toggleHeatmap() {
    const original = document.getElementById("main-img");
    const heatmap = document.getElementById("heatmap-img");
    const btn = document.getElementById("toggleBtn");

    if (heatmap.style.display === "none") {
        heatmap.style.display = "block";
        original.style.display = "none";
        btn.innerText = "Show Original";
    } else {
        heatmap.style.display = "none";
        original.style.display = "block";
        btn.innerText = "Show Heatmap";
    }
}
</script>

</body>
</html>
